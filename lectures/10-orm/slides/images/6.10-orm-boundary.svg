<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">ORM Boundary: Architecture Still Matters</title>
  <desc id="desc">Flow from routes to repository to Prisma to database.</desc>
  <rect width="1280" height="520" fill="#ffffff"/>
  <text x="640" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" fill="#1e1e1e">ORM Boundary: Architecture Still Matters</text>

  <rect x="120" y="170" width="220" height="120" rx="14" fill="#d0ebff" stroke="#1971c2" stroke-width="3"/>
  <text x="230" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" fill="#1e1e1e">Routes</text>

  <rect x="390" y="170" width="260" height="120" rx="14" fill="#d3f9d8" stroke="#2f9e44" stroke-width="3"/>
  <text x="520" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" fill="#1e1e1e">Repository</text>

  <rect x="700" y="170" width="220" height="120" rx="14" fill="#ffe8cc" stroke="#e67700" stroke-width="3"/>
  <text x="810" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" fill="#1e1e1e">Prisma</text>

  <rect x="970" y="170" width="180" height="120" rx="14" fill="#ffdeeb" stroke="#c2255c" stroke-width="3"/>
  <text x="1060" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" fill="#1e1e1e">DB</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#495057"/>
    </marker>
  </defs>

  <line x1="340" y1="230" x2="390" y2="230" stroke="#495057" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="650" y1="230" x2="700" y2="230" stroke="#495057" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="920" y1="230" x2="970" y2="230" stroke="#495057" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="640" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#1e1e1e">Swap storage implementation, not architecture.</text>
  <text x="640" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#1e1e1e">Prisma belongs inside the persistence boundary.</text>
</svg>
