<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="690" viewBox="0 0 1400 690" role="img" aria-labelledby="title desc">
  <title id="title">Race Condition: Lost Update</title>
  <desc id="desc">Two concurrent requests read the same value, both compute the same next value, and one update is lost.</desc>

  <rect x="0" y="0" width="1400" height="690" fill="#ffffff"/>

  <text x="700" y="52" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="700" fill="#1e1e1e">Race Condition: Lost Update</text>

  <rect x="565" y="82" width="270" height="64" rx="10" fill="#fff3bf" stroke="#1e1e1e" stroke-width="2.5"/>
  <text x="700" y="122" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#1e1e1e">Shared state: 0</text>

  <rect x="140" y="185" width="430" height="220" rx="12" fill="#d0ebff" stroke="#1971c2" stroke-width="2.5"/>
  <text x="175" y="230" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#1e1e1e">Request A</text>
  <text x="175" y="275" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#1e1e1e">1) reads 0</text>
  <text x="175" y="315" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#1e1e1e">2) computes 1</text>
  <text x="175" y="355" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#1e1e1e">3) writes 1</text>

  <rect x="830" y="185" width="430" height="220" rx="12" fill="#d3f9d8" stroke="#2f9e44" stroke-width="2.5"/>
  <text x="865" y="230" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#1e1e1e">Request B</text>
  <text x="865" y="275" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#1e1e1e">1) reads 0</text>
  <text x="865" y="315" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#1e1e1e">2) computes 1</text>
  <text x="865" y="355" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#1e1e1e">3) writes 1</text>

  <line x1="660" y1="146" x2="430" y2="185" stroke="#495057" stroke-width="3"/>
  <polygon points="430,185 445,171 449,191" fill="#495057"/>

  <line x1="740" y1="146" x2="970" y2="185" stroke="#495057" stroke-width="3"/>
  <polygon points="970,185 951,191 955,171" fill="#495057"/>

  <rect x="560" y="445" width="280" height="74" rx="10" fill="#ffe3e3" stroke="#c92a2a" stroke-width="2.5"/>
  <text x="700" y="491" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#c92a2a" font-weight="700">Final state: 1</text>

  <line x1="355" y1="405" x2="620" y2="445" stroke="#495057" stroke-width="3"/>
  <polygon points="620,445 603,450 607,431" fill="#495057"/>

  <line x1="1045" y1="405" x2="780" y2="445" stroke="#495057" stroke-width="3"/>
  <polygon points="780,445 793,431 797,450" fill="#495057"/>

  <text x="700" y="585" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="31" fill="#1e1e1e">Both requests looked correct alone.</text>
  <text x="700" y="626" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="31" fill="#1e1e1e">Together, timing caused one update to be overwritten.</text>
</svg>
