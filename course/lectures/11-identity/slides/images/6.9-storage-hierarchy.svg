<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Storage Hierarchy</title>
  <desc id="desc">Layered storage hierarchy from CPU cache/registers to remote database service, with durability and latency increasing downward.</desc>

  <rect x="0" y="0" width="1400" height="820" fill="#ffffff"/>

  <rect x="330" y="30" width="740" height="90" rx="14" fill="#e9ecef" stroke="#1e1e1e" stroke-width="3"/>
  <text x="700" y="86" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="44" fill="#1e1e1e">Storage Hierarchy</text>

  <rect x="360" y="170" width="680" height="110" rx="12" fill="#d3f9d8" stroke="#2f9e44" stroke-width="3"/>
  <text x="700" y="235" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="38" fill="#1e1e1e">CPU Cache / Registers</text>

  <rect x="360" y="300" width="680" height="110" rx="12" fill="#d0ebff" stroke="#1971c2" stroke-width="3"/>
  <text x="700" y="365" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="38" fill="#1e1e1e">RAM (Process Memory)</text>

  <rect x="360" y="430" width="680" height="110" rx="12" fill="#ffe8cc" stroke="#e67700" stroke-width="3"/>
  <text x="700" y="495" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="38" fill="#1e1e1e">Disk / SSD</text>

  <rect x="360" y="560" width="680" height="110" rx="12" fill="#ffdeeb" stroke="#c2255c" stroke-width="3"/>
  <text x="700" y="625" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="38" fill="#1e1e1e">Remote Database Service</text>

  <line x1="700" y1="280" x2="700" y2="300" stroke="#495057" stroke-width="4"/>
  <polygon points="700,300 690,282 710,282" fill="#495057"/>
  <line x1="700" y1="410" x2="700" y2="430" stroke="#495057" stroke-width="4"/>
  <polygon points="700,430 690,412 710,412" fill="#495057"/>
  <line x1="700" y1="540" x2="700" y2="560" stroke="#495057" stroke-width="4"/>
  <polygon points="700,560 690,542 710,542" fill="#495057"/>

  <line x1="250" y1="180" x2="250" y2="670" stroke="#1e1e1e" stroke-width="3" stroke-dasharray="12 10"/>
  <polygon points="250,670 238,650 262,650" fill="#1e1e1e"/>
  <text x="118" y="430" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#1e1e1e" transform="rotate(-90,118,430)">Durability increases</text>

  <line x1="1140" y1="180" x2="1140" y2="670" stroke="#1e1e1e" stroke-width="3" stroke-dasharray="12 10"/>
  <polygon points="1140,670 1128,650 1152,650" fill="#1e1e1e"/>
  <text x="1272" y="430" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#1e1e1e" transform="rotate(-90,1272,430)">Latency increases</text>
</svg>
