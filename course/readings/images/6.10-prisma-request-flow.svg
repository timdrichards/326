<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">Prisma Request Flow</title>
  <desc id="desc">Request path from HTTP route to validation to Prisma to SQLite and back.</desc>
  <rect width="1280" height="520" fill="#ffffff"/>
  <text x="640" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" fill="#1e1e1e">Prisma Request Flow</text>

  <rect x="120" y="180" width="220" height="110" rx="14" fill="#d0ebff" stroke="#1971c2" stroke-width="3"/>
  <text x="230" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" fill="#1e1e1e">HTTP Req</text>

  <rect x="390" y="180" width="240" height="110" rx="14" fill="#d3f9d8" stroke="#2f9e44" stroke-width="3"/>
  <text x="510" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" fill="#1e1e1e">Validate</text>

  <rect x="680" y="180" width="260" height="110" rx="14" fill="#ffe8cc" stroke="#e67700" stroke-width="3"/>
  <text x="810" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" fill="#1e1e1e">Prisma</text>

  <rect x="990" y="180" width="180" height="110" rx="14" fill="#ffdeeb" stroke="#c2255c" stroke-width="3"/>
  <text x="1080" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" fill="#1e1e1e">SQLite</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#495057"/>
    </marker>
  </defs>

  <line x1="340" y1="235" x2="390" y2="235" stroke="#495057" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="630" y1="235" x2="680" y2="235" stroke="#495057" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="940" y1="235" x2="990" y2="235" stroke="#495057" stroke-width="3" marker-end="url(#arrow)"/>

  <line x1="1080" y1="340" x2="240" y2="340" stroke="#1e1e1e" stroke-width="3" stroke-dasharray="10,8" marker-end="url(#arrow)"/>
  <text x="660" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#1e1e1e">Response with normalized output</text>
</svg>
